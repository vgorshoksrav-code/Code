<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>Эхарис: Дуэль душ</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="tabs">
        <button class="tab-btn active" data-tab="duel">⚔️ Дуэль</button>
        <button class="tab-btn" data-tab="hero">👤 Герой</button>
        <button class="tab-btn" data-tab="leaderboard">📊 Лидеры</button>
        <button class="tab-btn" data-tab="shop">✨ Лавка</button>
    </div>

    <!-- Вкладка Дуэль -->
    <div id="duel" class="tab-content active">
        <div class="arena">
            <div class="player opponent">
                <div class="avatar" id="opponentAvatar">👤</div>
                <div class="name" id="opponentName">Противник</div>
                <div class="hp-bar"><div class="hp-fill" id="opponentHpFill" style="width:100%"></div></div>
                <div class="hp-text"><span id="opponentHp">100</span>/100</div>
            </div>
            <div class="vs">VS</div>
            <div class="player me">
                <div class="avatar" id="myAvatar">🧙</div>
                <div class="name" id="myName">Вы</div>
                <div class="hp-bar"><div class="hp-fill" id="myHpFill" style="width:100%"></div></div>
                <div class="hp-text"><span id="myHp">100</span>/100</div>
            </div>
        </div>
        <div class="energy-bar">⚡ Энергия: <span id="energy">10</span> / <span id="maxEnergy">30</span></div>
        <div class="skills">
            <button class="skill" data-skill="0">🔥<br>Огн.стрела</button>
            <button class="skill" data-skill="1">❄️<br>Лед.щит</button>
            <button class="skill" data-skill="2">🌿<br>Связь</button>
            <button class="skill" data-skill="3">⚡<br>Цеп.молния</button>
            <button class="skill" data-skill="4">🌟<br>Зов предков</button>
        </div>
        <button id="findDuelBtn" class="action-btn">🔍 Найти бой</button>
        <div class="battle-log" id="battleLog"></div>
    </div>

    <!-- Вкладка Герой -->
    <div id="hero" class="tab-content">
        <div class="stats-card">
            <h3>📊 Характеристики</h3>
            <div class="stat-row">⚔️ Сила: <span id="attackStat">0</span>%</div>
            <div class="stat-row">🛡️ Защита: <span id="defenseStat">0</span>%</div>
            <div class="stat-row">🔋 Макс.энергия: <span id="energyStat">0</span>%</div>
            <div class="stat-row">🍀 Удача (крит): <span id="luckStat">10</span>%</div>
        </div>
        <div class="skills-upgrade">
            <h4>🌀 Уровни скилов</h4>
            <div id="skillsLevels" class="skills-list"></div>
            <div class="shards-balance">💎 Осколков: <span id="shardsCount">0</span></div>
        </div>
        <div class="skins-gallery">
            <h4>🎭 Мои скины</h4>
            <div id="skinsList" class="skins-grid"></div>
        </div>
    </div>

    <!-- Вкладка Лидеры -->
    <div id="leaderboard" class="tab-content">
        <h3>🏆 Топ-20 игроков</h3>
        <div class="leaderboard-container">
            <table id="leaderboardTable">
                <thead>
                    <tr><th>#</th><th>Игрок</th><th>Ранг</th><th>Победы</th><th>Скин</th></tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <!-- Вкладка Лавка -->
    <div id="shop" class="tab-content">
        <h3>✨ Магазин скинов</h3>
        <div id="shopItems" class="shop-grid"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
